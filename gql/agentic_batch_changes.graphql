"""
A workflow definition for agentic batch changes.

EXPERIMENTAL: This API is experimental and subject to change.
"""
type AgenticWorkflow implements Node {
    """
    The unique ID of the workflow.
    """
    id: ID!

    """
    The name of the workflow.
    """
    name: String!

    """
    The JSON definition of the workflow.
    """
    definition: String!

    """
    The instances of this workflow. Returns at most 1000 instances.
    """
    instances(first: Int, after: String): AgenticWorkflowInstanceConnection!
}

"""
A list of agentic workflows.

EXPERIMENTAL: This API is experimental and subject to change.
"""
type AgenticWorkflowConnection {
    """
    A list of workflows.
    """
    nodes: [AgenticWorkflow!]!

    """
    The total count of workflows in the connection.
    """
    totalCount: Int!

    """
    Pagination information.
    """
    pageInfo: PageInfo!
}

"""
The status of a workflow instance.

EXPERIMENTAL: This API is experimental and subject to change.
"""
enum AgenticWorkflowInstanceStatus {
    """
    The instance is queued and waiting to run.
    """
    QUEUED

    """
    The instance is currently running.
    """
    RUNNING

    """
    The instance is paused and will not make progress until unpaused.
    Asynchronous nodes may continue to run, but progress will not be tracked until the instance is resumed.
    """
    PAUSED

    """
    The instance completed successfully.
    """
    COMPLETE

    """
    The instance failed.
    """
    FAILED
}

"""
An instance of an agentic workflow.

EXPERIMENTAL: This API is experimental and subject to change.
"""
type AgenticWorkflowInstance implements Node {
    """
    The unique ID of the instance.
    """
    id: ID!

    """
    The workflow this instance belongs to.
    """
    workflow: AgenticWorkflow!

    """
    The JSON definition of the workflow at the time the instance was created.
    """
    definition: String!

    """
    The input provided to this instance.
    """
    input: String

    """
    The current status of the instance.
    """
    status: AgenticWorkflowInstanceStatus!

    """
    EXPERIMENTAL: The current variable state of the instance as a JSON object.
    Secrets are redacted. Updated as nodes complete.
    """
    variables: String!

    """
    The historical node states for this instance, ordered by creation time.
    """
    nodeStates: [AgenticWorkflowInstanceNodeState!]!
}

"""
A snapshot of a node's state within a workflow instance. A new snapshot is added each time the node's lifecycle phase changes.

EXPERIMENTAL: This API is experimental and subject to change.
"""
type AgenticWorkflowInstanceNodeState {
    """
    The ID of the node spec this state belongs to.
    """
    nodeSpecID: String!

    """
    The type of the node (e.g. decision, wait).
    """
    nodeType: String!

    """
    The lifecycle phase of the node.
    """
    lifecyclePhase: AgenticWorkflowInstanceStatus!

    """
    The output produced by the node, if any.
    """
    output: String!

    """
    The recorded error for this node state, if any.
    """
    error: String

    """
    When this state snapshot was created.
    """
    createdAt: DateTime!
}

"""
A list of workflow instances.

EXPERIMENTAL: This API is experimental and subject to change.
"""
type AgenticWorkflowInstanceConnection {
    """
    A list of instances.
    """
    nodes: [AgenticWorkflowInstance!]!

    """
    The total count of instances in the connection.
    """
    totalCount: Int!

    """
    Pagination information.
    """
    pageInfo: PageInfo!
}

extend type Query {
    """
    List all agentic workflows.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    agenticWorkflows(first: Int, after: String): AgenticWorkflowConnection!

    """
    Get a specific agentic workflow by ID.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    agenticWorkflow(id: ID!): AgenticWorkflow

    """
    Get the JSON schema for workflow definitions.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    agenticWorkflowSchema: String!
}

extend type Mutation {
    """
    Create a new agentic workflow.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    createAgenticWorkflow(
        """
        The name of the workflow.
        """
        name: String!

        """
        The JSON definition of the workflow.
        """
        definition: String!
    ): AgenticWorkflow!

    """
    Start an instance of a workflow.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    startAgenticWorkflowInstance(
        """
        The ID of the workflow to start.
        """
        workflowID: ID!

        """
        Optional input for the instance.
        """
        input: String
    ): AgenticWorkflowInstance!

    """
    Pause a running workflow instance. Only running instances can be paused.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    pauseAgenticWorkflowInstance(
        """
        The ID of the instance to pause.
        """
        instanceID: ID!
    ): AgenticWorkflowInstance!

    """
    Unpause a paused workflow instance, resuming execution.

    EXPERIMENTAL: This API is experimental and subject to change.
    """
    unpauseAgenticWorkflowInstance(
        """
        The ID of the instance to unpause.
        """
        instanceID: ID!
    ): AgenticWorkflowInstance!
}
